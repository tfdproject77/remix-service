    <DISPLAY nooptions notvaudio>

<!--

Theme switcher MattMan69 GraspYonOx@hotmail.com 2023

Super hacky on the backend, dialing options bypass in approm.o BYOISP provider name was
used to store the theme into memory. Other ways are available but this was the easiest
option that I could think of.   **There must be a better way!  Why do I do this??**

Special thanks to SKCro for blue theme and providing the motivation to add the feature to
the HackTV custom build.     

Viewer -- This works best on the latest version of the Hackers Edition Viewer. Other viewers
will give errors if not connected to the HTV server but will still switch the theme. If connected
to other servers you may be redirected to another page after selecting theme or get an error.

Box -- This works best on a box when using the latest HTV custom build for the old plus models. Using 
other builds will result in getting redirected to PhoneSetupIntro page. It will still switch the
theme but kinda makes for a messy experience.

--->


<form name="theme" id="theme">
  <input type="hidden" value="&pname;" id="name">
  <script>
    var htvtheme=document.theme.name.value;
    
    if (htvtheme == "light") {
    	//light theme
        logolight()
    } else if (htvtheme == "dark") {
    	//dark theme
          logodark()
    } else if (htvtheme == "blue") {
    	//blue theme
          logoblue()
    } else if (htvtheme == "") {
    	//no theme default to light
          themeAlert()
    }
    
    function logolight() {
    document.write("<link rel='stylesheet' type='text/css' href='light.css'>");
    }
    
    function logodark() {
    document.write("<link rel='stylesheet' type='text/css' href='dark.css'>");
    }
    
    function logoblue() {
    document.write("<link rel='stylesheet' type='text/css' href='blue.css'>");
    }

    function themeAlert() {
    document.write("<link rel='stylesheet' type='text/css' href='light.css'>");
	}
  </script>
</form>

</head>
