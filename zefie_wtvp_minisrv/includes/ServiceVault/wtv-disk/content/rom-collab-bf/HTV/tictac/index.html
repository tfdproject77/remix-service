function yourChoice(chName) {
pause = 0;
if (all!=0) ended();
if (all==0) {
cf = 0;
ok = 0;
temp=chName;
checkSpace();
if (ok==1) {
document.images[chName].src = x;
}
if (ok==0)taken();
process();
if ((all==0)&&(pause==0)) myChoice();
   }
}
function taken() {
//alert("That square is already occupied.  Please select another square.")
window.location="client:showalert?message=That%20square%20is%20already%20occupied.%20%20Please%20select%20another%20square.";
pause=1;
}
function myChoice() {
temp="";
ok = 0;
cf=1;
logicTwo();
logicThree();
checkSpace();
while(ok==0) {
aRandomNumber=Math.random()
comp=Math.round((choice-1)*aRandomNumber)+1;
if (comp==1) temp="A";
if (comp==2) temp="B";
if (comp==3) temp="C";
if (comp==4) temp="D";
if (comp==5) temp="E";
if (comp==6) temp="F";
if (comp==7) temp="G";
if (comp==8) temp="H";
if (comp==9) temp="I";
checkSpace();
}
document.images[temp].src= o;
process();
}
function ended() {
PlaySound(document.tie); document.message.alert.value="The game has ended."
//alert("The game has ended.")
//window.location="client:showalert?message=The%20game%20has%20ended.";
}
function PlaySound(sound) {
if (sound == null) {  
return;
} else {
sound.play(false);
}
}
function process() {
logicOne();
if (all==1){ PlaySound(document.win); document.message.alert.value="You won, congratulations!"; wn++; }
if (all==2){ PlaySound(document.lose); document.message.alert.value="Gotcha!  I win!"; ls++; }
if (all==3){ PlaySound(document.tie); document.message.alert.value="We Tied"; ts++; }
//if (all==1){ window.location="client:showalert?message=You%20won%2C%20congratulations!"; wn++; }
//if (all==2){ PlaySound(document.lose); window.location="client:showalert?message=Loser!"; ls++; }
//if (all==3){ window.location="client:showalert?message=We%20Tied."; ts++; }
if (all!=0) {
document.game.you.value = wn;
document.game.computer.value = ls;
document.game.ties.value = ts;
   }
}
function playAgain() {
if (all==0) {
if(confirm("This will restart the game and clear all the current scores. OK?")) reset();
location.reload();
}
if (all>0) reset();
}
function reset() {
all = 0;
a = 0;
b = 0;
c = 0;
d = 0;
e = 0;
f = 0;
g = 0;
h = 0;
i = 0;
temp="";
