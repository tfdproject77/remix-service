<form name="theme" id="theme">
  <input type="hidden" value="&pname;" id="name">
  <script>
    var htvtheme=document.theme.name.value;
    
    if (htvtheme == "light") {
    	//light theme
        logolight()
    } else if (htvtheme == "dark") {
    	//dark theme
          logodark()
    } else if (htvtheme == "blue") {
    	//blue theme
          logoblue()
    } else if (htvtheme == "") {
    	//no theme
          themeAlert()
    }
    
    function logolight() {
    document.write("<link rel='stylesheet' type='text/css' href='../theme/light.css'>");
    }
    
    function logodark() {
    document.write("<link rel='stylesheet' type='text/css' href='../theme/dark.css'>");
    }
    
    function logoblue() {
    document.write("<link rel='stylesheet' type='text/css' href='../theme/blue.css'>");
    }

    function themeAlert() {
    document.write("<link rel='stylesheet' type='text/css' href='../theme/light.css'>");
	}
  </script>
 </form>
