<script>

function playmidi() {
    document.bgmusic.play();
}

function timer() {
    setTimeout('launch()',9000);
}

function launch() {
	if (document.launchtext.text.value == "doom") {
    window.location="StartGame.html?launch=playDoom";
} 
    else if (document.launchtext.text.value == "doomc") {
    window.location="StartGame.html?launch=playDoomC";
}
    else if (document.launchtext.text.value == "doomf") {
    window.location="StartGame.html?launch=playDoomF";
}
    else if (document.launchtext.text.value == "chex") {
    window.location="StartGame.html?launch=playChex";
}

}

function doomtimer() {
    setTimeout('doom()',4000);
}
function doomctimer() {
    setTimeout('doomc()',4000);
}
function doomftimer() {
    setTimeout('doomf()',4000);
}
function chextimer() {
    setTimeout('chex()',4000);
}
  function doom() {
  document.launchtext.text.value='doom'
  document.bgmstat.title.value='Loading Doom Original...'
}
  function doomc() {
  document.launchtext.text.value='doomc'
  document.bgmstat.title.value='Loading Doom Custom...'
}
  function doomf() {
  document.launchtext.text.value='doomf'
  document.bgmstat.title.value='Loading FreeDoom...'
}
  function chex() {
  document.launchtext.text.value='chex'
  document.bgmstat.title.value='Loading Chex Quest...';
}
</script>

<script>

// script 2006 Zefie

function doWait() {
	playeron = document.bgmusic.isPlaying();
	if (playeron == true) {
		len = document.bgmusic.getPlayLength();
		cur = document.bgmusic.getPosition();
		percent = (cur / len) * 100;
		document.bgmprog.setMessage(" ");
		document.bgmprog.setPercentDone(percent)
		document.bgmprog.setAllowReverseProgress(true)
		waittimer = setTimeout("doWait()",300);
	}
	else {
		document.bgmprog.setMessage("");
		document.bgmprog.setPercentDone(0)
		document.bgmstat.time.value = "";
		waittimer = setTimeout("doWait()",300);
	}
}

</script>
